# ==========================================================
# STACK REGIONAL: SUR
# ----------------------------------------------------------
# Requiere que el stack `logistica-cluster` esté levantado.
#
#   docker compose -f docker-compose.sur.yml -p logistica-sur up -d
# ==========================================================
services:
  # ----------------------------------------------------------
  # LOAD BALANCER (HAPROXY) - REGION SUR
  # ----------------------------------------------------------
  lb_sur:
    image: haproxy:2.8-alpine
    container_name: lb_sur
    ports:
      - "26003:26257"
    volumes:
      - ./haproxy-sur.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - cluster_db       # Alcance a los nodos roach1/2/3
      - regionSur        # Puente hacia la API de la región
    restart: unless-stopped

  # ----------------------------------------------------------
  # BROKER MQTT - REGION SUR
  # ----------------------------------------------------------
  brokersur:
    image: eclipse-mosquitto:2.0.18
    container_name: broker-mosquitto-sur
    ports:
      - "1885:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - regionSur
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # API NODE.JS - REGION SUR
  # ----------------------------------------------------------
  api_sur:
    build:
      context: ./backend-logistica
    container_name: server_sur
    ports:
      - "3002:3000"    # Expuesto en 3002 al host, 3000 dentro del contenedor
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://root@lb_sur:26257/logistica_flotilla?sslmode=disable
      - MQTT_BROKER_URL=mqtt://brokersur:1883
      - REGION_ID=SUR
      - JWT_SECRET=complex_secret_key_for_jwt_logistic_system
    volumes:
      - ./backend-logistica/src:/usr/src/app/src
    depends_on:
      lb_sur:
        condition: service_started
      brokersur:
        condition: service_healthy
    networks:
      - regionSur
    restart: unless-stopped

# ==========================================================
# REDES
# ==========================================================
networks:
  regionSur:
    name: regionSur
    driver: bridge

  cluster_db:
    name: cluster_db
    external: true
