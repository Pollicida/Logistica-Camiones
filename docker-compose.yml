# ==========================================
# DEFINICIÓN DE VOLÚMENES Y REDES
# ==========================================
volumes:
  roach1_data:
  roach2_data:
  roach3_data:

networks:
  cluster_db:
    name: cluster_db
    driver: bridge
  regionNorte:
    name: regionNorte
    driver: bridge
  regionCentral:
    name: regionCentral
    driver: bridge
  regionSur:
    name: regionSur
    driver: bridge