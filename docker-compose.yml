services:
  databasecentral:
    image: postgres:16.2-alpine
    container_name: postgres_db_central
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: central
    command: postgres -c wal_level=logical
    ports:
      - "5432:5432"
    depends_on:
      - databasesur
      - databasenorte
    volumes:
      - postgres_storage_central:/var/lib/postgresql/data
    networks:
      databases:
        aliases:
          - databasecentral
      regionCentral:
        aliases:
          - databasecentral
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistica"]
      interval: 5s
      timeout: 5s
      retries: 5

  databasesur:
    image: postgres:16.2-alpine
    container_name: postgres_db_sur
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: sur
    command: postgres -c wal_level=logical
    ports:
      - "5433:5432"
    volumes:
      - postgres_storage_sur:/var/lib/postgresql/data
    networks:
      databases:
        aliases:
          - databasesur
      regionSur:
        aliases:
          - databasesur
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistica"]
      interval: 5s
      timeout: 5s
      retries: 5

  databasenorte:
    image: postgres:16.2-alpine
    container_name: postgres_db_norte
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: norte
    command: postgres -c wal_level=logical
    ports:
      - "5434:5432" # Puerto host modificado
    volumes:
      - postgres_storage_norte:/var/lib/postgresql/data
    networks:
      databases:
        aliases:
          - databasenorte
      regionNorte:
        aliases:
          - databasenorte
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistica"]
      interval: 5s
      timeout: 5s
      retries: 5

