  brokercentral:
    image: eclipse-mosquitto:2.0.18
    container_name: broker-mosquitto-central
    ports:
      - "1881:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      regionCentral:
        aliases:
          - brokercentral
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  brokersur:
    image: eclipse-mosquitto:2.0.18
    container_name: broker-mosquitto-sur
    ports:
      - "1882:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      regionSur:
        aliases:
          - brokersur
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  brokernorte:
    image: eclipse-mosquitto:2.0.18
    container_name: broker-mosquitto-norte
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      regionNorte:
        aliases:
          - brokernorte
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_storage_central:
  postgres_storage_sur:
  postgres_storage_norte:

networks: 
  regionSur:
    name: regionSur
    driver: bridge
  regionNorte:
    name: regionNorte
    driver: bridge
  regionCentral:
    name: regionCentral
    driver: bridge
  databases:
    name: databases
    driver: bridge