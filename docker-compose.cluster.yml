# ==========================================================
# STACK BASE: CLÚSTER COCKROACHDB COMPARTIDO
# ----------------------------------------------------------
# Levantar PRIMERO. Las regiones dependen de este cluster.
#
#   docker compose -f docker-compose.cluster.yml -p logistica-cluster up -d
#
# Este stack crea:
#   - Red externa `cluster_db` (usada por los HAProxy regionales)
#   - 3 nodos CockroachDB + job de init
#   - Volúmenes persistentes
# ==========================================================
services:
  # ----------------------------------------------------------
  # CAPA DE ALMACENAMIENTO (COCKROACHDB)
  # ----------------------------------------------------------
  roach1:
    image: cockroachdb/cockroach:v23.1.10
    container_name: roach1
    command: start --insecure --join=roach1,roach2,roach3 --listen-addr=roach1:26257 --advertise-addr=roach1:26257
    ports:
      - "8080:8080"
    volumes:
      - roach1_data:/cockroach/cockroach-data
    networks:
      - cluster_db
    restart: unless-stopped

  roach2:
    image: cockroachdb/cockroach:v23.1.10
    container_name: roach2
    command: start --insecure --join=roach1,roach2,roach3 --listen-addr=roach2:26257 --advertise-addr=roach2:26257
    ports:
      - "8081:8080"
    volumes:
      - roach2_data:/cockroach/cockroach-data
    networks:
      - cluster_db
    restart: unless-stopped

  roach3:
    image: cockroachdb/cockroach:v23.1.10
    container_name: roach3
    command: start --insecure --join=roach1,roach2,roach3 --listen-addr=roach3:26257 --advertise-addr=roach3:26257
    ports:
      - "8082:8080"
    volumes:
      - roach3_data:/cockroach/cockroach-data
    networks:
      - cluster_db
    restart: unless-stopped

  # ----------------------------------------------------------
  # JOB DE BOOTSTRAP (se ejecuta una sola vez)
  # ----------------------------------------------------------
  init:
    image: cockroachdb/cockroach:v23.1.10
    container_name: cockroach_init
    command: init --insecure --host=roach1:26257
    depends_on:
      - roach1
      - roach2
      - roach3
    networks:
      - cluster_db
    restart: "no"

# ==========================================================
# VOLÚMENES Y REDES
# ==========================================================
volumes:
  roach1_data:
  roach2_data:
  roach3_data:

networks:
  # La red `cluster_db` se crea aquí y es consumida como external
  # por los stacks regionales (norte/centro/sur).
  cluster_db:
    name: cluster_db
    driver: bridge
