# ==========================================================
# STACK REGIONAL: NORTE
# ----------------------------------------------------------
# Requiere que el stack `logistica-cluster` esté levantado.
#
#   docker compose -f docker-compose.norte.yml -p logistica-norte up -d
# ==========================================================
services:
  # ----------------------------------------------------------
  # LOAD BALANCER (HAPROXY) - REGION NORTE
  # ----------------------------------------------------------
  lb_norte:
    image: haproxy:2.8-alpine
    container_name: lb_norte
    ports:
      - "26001:26257"
    volumes:
      - ./haproxy-norte.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - cluster_db       # Alcance a los nodos roach1/2/3
      - regionNorte      # Puente hacia la API de la región
    restart: unless-stopped

  # ----------------------------------------------------------
  # BROKER MQTT - REGION NORTE
  # ----------------------------------------------------------
  brokernorte:
    image: eclipse-mosquitto:2.0.18
    container_name: broker-mosquitto-norte
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - regionNorte
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # API NODE.JS - REGION NORTE
  # ----------------------------------------------------------
  api_norte:
    build:
      context: ./backend-logistica
    container_name: server_norte
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://root@lb_norte:26257/logistica_flotilla?sslmode=disable
      - MQTT_BROKER_URL=mqtt://brokernorte:1883
      - REGION_ID=NORTE
      - JWT_SECRET=complex_secret_key_for_jwt_logistic_system
    volumes:
      - ./backend-logistica/src:/usr/src/app/src
    depends_on:
      lb_norte:
        condition: service_started
      brokernorte:
        condition: service_healthy
    networks:
      - regionNorte
    restart: unless-stopped

# ==========================================================
# REDES
# ==========================================================
networks:
  # Red regional - creada por este stack
  regionNorte:
    name: regionNorte
    driver: bridge

  # Red del clúster - externa, creada por docker-compose.cluster.yml
  cluster_db:
    name: cluster_db
    external: true
